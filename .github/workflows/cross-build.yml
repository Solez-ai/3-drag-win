name: cross-build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  cross-build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64 (musl)
            target: x86_64-unknown-linux-musl
            ext: ""
            asset_name: 3-win-drag-linux-x86_64-musl

          - label: Linux aarch64
            target: aarch64-unknown-linux-gnu
            ext: ""
            asset_name: 3-win-drag-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libx11-dev libxtst-dev libgtk-3-dev \
            libappindicator3-dev libwayland-dev \
            musl-tools gcc-aarch64-linux-gnu 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          PKG="${{ matrix.asset_name }}"
          mkdir -p "$PKG"
          cp "target/${{ matrix.target }}/release/3-win-drag${{ matrix.ext }}" "$PKG/"
          cp README.md LICENSE "$PKG/"
          tar czf "${PKG}.tar.gz" "$PKG/"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*
          compression-level: 0
          if-no-files-found: error

  upload:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cross-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
