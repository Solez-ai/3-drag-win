name: build

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            asset_name: 3-win-drag-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (zip)
        shell: pwsh
        run: |
          $pkg = "${{ matrix.asset_name }}"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/3-win-drag${{ matrix.ext }}" -Destination "$pkg"
          Copy-Item README.md, LICENSE -Destination "$pkg"
          Compress-Archive -Path "$pkg\*" -DestinationPath "${pkg}.zip" -Force

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress --confirm

      - name: Build installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path target/release -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/3-win-drag.exe" "target/release/3-win-drag.exe"
          & .\scripts\build-installer.ps1 -SkipBuild

      - name: Upload (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*
          compression-level: 0
          if-no-files-found: error

      - name: Upload (installer)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: 3-win-drag-installer
          path: dist/installer/*.exe
          compression-level: 0
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: .github/RELEASE_NOTES.md
