# ─────────────────────────────────────────────────────────────────────
# Cross.toml - cross-rs cross-compilation configuration
#
# Usage:
#   cargo install cross
#   cross build --target x86_64-unknown-linux-gnu --release
#
# Requires Docker Desktop to be running.
# ─────────────────────────────────────────────────────────────────────

[build]
# Pre-build the dependencies (faster subsequent builds)
pre-build = """
apt-get update && apt-get install -y \
    libx11-dev \
    libxtst-dev \
    libwayland-dev \
    libgtk-3-dev \
    libappindicator3-dev \
    libgdk-pixbuf2.0-dev \
    && apt-get clean
"""

[target.x86_64-unknown-linux-gnu]
# Default GNU image - best compatibility with mainstream distros
image = "x86_64-unknown-linux-gnu"

[target.x86_64-unknown-linux-musl]
# Fully static binary - works even on minimal containers
image = "x86_64-unknown-linux-musl"

[target.aarch64-unknown-linux-gnu]
# ARM64 (Raspberry Pi, Apple Silicon VMs, AWS Graviton)
image = "aarch64-unknown-linux-gnu"
